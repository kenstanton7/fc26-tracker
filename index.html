<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC 26 Ultimate Tracker</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background: #1a1a2e; 
            color: white; 
            padding: 20px; 
            margin: 0;
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding: 20px;
            background: #16213e;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 10px 0; color: #e94560; }
        #stats { 
            font-size: 1.5rem; 
            color: #00ffcc; 
            font-weight: bold; 
        }
        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center; 
            padding-bottom: 50px;
        }
        
        /* The Card Visual */
        .card {
            width: 160px; height: 230px;
            background: linear-gradient(135deg, #f0d060, #d4af37, #9b7f23);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            transition: transform 0.2s, filter 0.2s;
            color: #222;
            user-select: none;
        }
        .card:hover { transform: translateY(-5px); }
        
        /* Card Text Elements */
        .rating { font-size: 28px; font-weight: 900; position: absolute; top: 10px; left: 12px; }
        .position { font-size: 14px; font-weight: bold; position: absolute; top: 45px; left: 14px; }
        .club, .nation { font-size: 10px; font-weight: bold; position: absolute; left: 14px; text-transform: uppercase; }
        .club { top: 70px; }
        .nation { top: 85px; }
        .name { 
            position: absolute; 
            bottom: 15px; 
            width: 100%; 
            text-align: center; 
            font-size: 14px; 
            font-weight: 900; 
            text-transform: uppercase; 
            padding: 0 5px; 
            box-sizing: border-box; 
        }
        
        /* The "Collected" Checked State */
        .card.collected { filter: grayscale(100%) opacity(0.4); }
        .checkmark {
            display: none; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; color: #00ff00; text-shadow: 0 0 15px black; z-index: 10;
        }
        .card.collected .checkmark { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>My FC 26 Collection</h1>
        <div id="stats">Collected: 0 / 0</div>
    </div>

    <!-- The grid where your cards will appear -->
    <div class="grid" id="card-container"></div>

    <!-- Load the data generated from Python -->
    <!-- If players.js doesn't exist yet, it will throw a harmless error in console -->
    <script src="players.js"></script>

    <script>
        // 1. Load saved data from the browser's memory
        let savedCollection = JSON.parse(localStorage.getItem('fc26_collection')) || {};

        // Fallback dummy data just in case players.js hasn't been generated by GitHub yet
        let players = [];
        if (typeof playersData !== 'undefined') {
            players = playersData;
        } else {
            players = [
                { id: 999, name: "Loading...", rating: 0, position: "N/A", club: "Pending", nation: "Pending" }
            ];
            document.getElementById('stats').innerText = "Waiting for GitHub Action to fetch data...";
        }

        // 2. Build the visual cards
        function renderCards() {
            if (players.length === 1 && players[0].id === 999) return; // Still loading

            const container = document.getElementById('card-container');
            container.innerHTML = '';
            let collectedCount = 0;

            players.forEach(player => {
                const isCollected = savedCollection[player.id];
                if (isCollected) collectedCount++;

                const cardHTML = `
                    <div class="card ${isCollected ? 'collected' : ''}" onclick="toggleCard(${player.id})">
                        <div class="rating">${player.rating}</div>
                        <div class="position">${player.position}</div>
                        <div class="club">${player.club}</div>
                        <div class="nation">${player.nation}</div>
                        <div class="name">${player.name}</div>
                        <div class="checkmark">✔</div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            document.getElementById('stats').innerText = `Collected: ${collectedCount} / ${players.length}`;
        }

        // 3. Handle clicks and save to the browser
        window.toggleCard = function(id) {
            if (id === 999) return; // Don't toggle the loading card
            savedCollection[id] = !savedCollection[id];
            localStorage.setItem('fc26_collection', JSON.stringify(savedCollection));
            renderCards(); // Refresh the screen
        };

        // Start the app
        renderCards();
    </script>
</body>
</html>
