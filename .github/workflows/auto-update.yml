name: Daily FC26 Card Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Grab your website code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required libraries
        run: pip install pandas requests

      - name: Run your update script
        run: python fetch_new_cards.py

      - name: Save the new cards to your website
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add players.js
          git commit -m "Automated daily card update" || exit 0
          git push
